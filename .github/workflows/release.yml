name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-go-binaries:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build
      working-directory: bridge-e2ee
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p ../build
        output_name=fbchat-bridge-e2ee-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          output_name+='.exe'
        fi
        go build -o ../build/$output_name main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/fbchat-bridge-e2ee-*
        
  create-release:
    needs: build-go-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all workflow run artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-binaries
        pattern: binaries-*
        merge-multiple: true

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: all-binaries/*
        body_path: .github/RELEASE_NOTES_${{ github.ref_name }}.md
